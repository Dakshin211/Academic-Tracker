<html>
 <head>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap" rel="stylesheet"/>
  <style>
   body {
            font-family: 'Inter', sans-serif;
        }
  </style>
 </head>
 <body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white shadow-md rounded-lg flex">
   <div class="hidden md:flex items-center justify-center p-8">
    <img alt="Illustration of a person standing next to a large mobile phone with a login form on the screen" class="w-96 h-auto" height="400" src="https://storage.googleapis.com/a1aa/image/eh3SSREPp62HDaQ0pyMr0g39fHrvoIKNyz6JStPj8LAvy7nTA.jpg" width="400"/>
   </div>
   <div class="p-8">
    <h1 class="text-2xl font-bold mb-2">
     Welcome to
    </h1>
    <h2 class="text-3xl font-bold text-purple-600 mb-6">
     Msec
    </h2>
    <form>
     <div class="mb-4">
      <label class="block text-gray-700 mb-2" for="username">
       Enter your username
      </label>
      <input class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600" id="username" placeholder="Username" type="text"/>
     </div>
     <div class="mb-6">
      <label class="block text-gray-700 mb-2" for="password">
       Enter your password
      </label>
      <div class="relative">
       <input class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600" id="password" placeholder="Password" type="password"/>
       <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-600">
        <i class="fas fa-eye">
        </i>
       </span>
      </div>
     </div>
     <button class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition duration-200">
      Login
     </button>
    </form>
    <p class="mt-4 text-center text-gray-600">
     Don't have an account?
     <a class="text-purple-600" href="#">
      Register
     </a>
    </p>
   </div>
  </div>
 </body>
</html>
